<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KIAS Admin Panel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell admin-shell-layout">
      <header class="topbar">
        <div class="brand">
          <div class="logo">K</div>
          <span>Kreed Admin Console</span>
        </div>
        <nav class="main-nav">
          <a href="index.html">Main Site</a>
          <a href="kias.html">KIAS Portal</a>
        </nav>
      </header>

      <main class="admin-main-layout">
        <section class="admin-panel-card">
          <h1>Content Distribution Panel</h1>
          <p class="lead">Upload files and publish them directly to any section on <strong>index.html</strong> or <strong>kias.html</strong>.</p>

          <div class="admin-controls-grid">
            <label>
              Target page
              <select id="target-page">
                <option value="index">index.html</option>
                <option value="kias">kias.html</option>
              </select>
            </label>
            <label>
              Target section
              <select id="target-section">
                <option value="about">About Us</option>
                <option value="divisions">Divisions</option>
                <option value="innovation">Innovation</option>
                <option value="careers">Careers</option>
                <option value="investors">Investors</option>
                <option value="newsroom">Newsroom</option>
                <option value="contact">Contact</option>
              </select>
            </label>
          </div>

          <div id="drop-zone" class="drop-zone">
            <p>Drop files here or click to select files</p>
            <input id="file-input" type="file" multiple />
          </div>

          <p id="admin-message" class="publish-status" aria-live="polite"></p>
        </section>

        <section class="admin-panel-card">
          <div class="admin-list-header">
            <h2>Published Files</h2>
            <button id="clear-all" class="btn btn-outline" type="button">Clear All</button>
          </div>
          <div id="asset-list" class="admin-asset-list"></div>
        </section>
      </main>
    </div>

    <script>
      const storageKey = "kiasContentAssets";
      const sectionLabels = {
        about: "About Us",
        divisions: "Divisions",
        innovation: "Innovation",
        careers: "Careers",
        investors: "Investors",
        newsroom: "Newsroom",
        contact: "Contact",
      };

      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("file-input");
      const targetPage = document.getElementById("target-page");
      const targetSection = document.getElementById("target-section");
      const assetList = document.getElementById("asset-list");
      const adminMessage = document.getElementById("admin-message");
      const clearAllButton = document.getElementById("clear-all");

      const getAssets = () => {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || "[]");
        } catch {
          return [];
        }
      };

      const saveAssets = (assets) => {
        localStorage.setItem(storageKey, JSON.stringify(assets));
      };

      const readFileAsDataUrl = (file) =>
        new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });

      const renderList = () => {
        const assets = getAssets().sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));
        if (!assets.length) {
          assetList.innerHTML = '<p class="asset-empty">No files published yet.</p>';
          return;
        }

        assetList.innerHTML = assets
          .map(
            (asset) => `
              <article class="asset-row">
                ${asset.type.startsWith("image/") ? `<img src="${asset.dataUrl}" alt="${asset.name}" />` : `<div class="asset-icon">FILE</div>`}
                <div>
                  <p class="asset-name">${asset.name}</p>
                  <p class="asset-meta">${asset.targetPage}.html → ${sectionLabels[asset.targetSection]} • ${new Date(asset.uploadedAt).toLocaleString()}</p>
                </div>
                <button class="btn btn-outline" data-id="${asset.id}" type="button">Delete</button>
              </article>
            `
          )
          .join("");

        assetList.querySelectorAll("button[data-id]").forEach((button) => {
          button.addEventListener("click", () => {
            const assetsNow = getAssets().filter((asset) => asset.id !== button.dataset.id);
            saveAssets(assetsNow);
            renderList();
            adminMessage.textContent = "Asset deleted.";
          });
        });
      };

      const handleFiles = async (files) => {
        const selectedFiles = Array.from(files || []);
        if (!selectedFiles.length) return;

        const assets = getAssets();
        for (const file of selectedFiles) {
          const dataUrl = await readFileAsDataUrl(file);
          assets.push({
            id: crypto.randomUUID(),
            name: file.name,
            type: file.type || "application/octet-stream",
            size: file.size,
            dataUrl,
            targetPage: targetPage.value,
            targetSection: targetSection.value,
            uploadedAt: new Date().toISOString(),
          });
        }

        saveAssets(assets);
        renderList();
        adminMessage.textContent = `Published ${selectedFiles.length} file(s) to ${targetPage.value}.html / ${sectionLabels[targetSection.value]}.`;
      };

      dropZone.addEventListener("click", () => fileInput.click());
      dropZone.addEventListener("dragover", (event) => {
        event.preventDefault();
        dropZone.classList.add("drag-active");
      });
      dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-active"));
      dropZone.addEventListener("drop", (event) => {
        event.preventDefault();
        dropZone.classList.remove("drag-active");
        handleFiles(event.dataTransfer.files);
      });

      fileInput.addEventListener("change", (event) => {
        handleFiles(event.target.files);
        event.target.value = "";
      });

      clearAllButton.addEventListener("click", () => {
        saveAssets([]);
        renderList();
        adminMessage.textContent = "All published files removed.";
      });

      renderList();
    </script>
  </body>
</html>
