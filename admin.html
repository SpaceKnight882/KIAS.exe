<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K.I.A.S Admin Panel</title>
    <style>
      :root {
        --bg: #000;
        --panel: #0b0b0b;
        --line: #2a2a2a;
        --text: #f2f2f2;
        --muted: #9a9a9a;
        --ok: #8dffb2;
        --bad: #ff9b9b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Courier New", monospace;
        background: radial-gradient(circle at top, #111 0%, #000 65%);
        color: var(--text);
      }
      .wrap { max-width: 1280px; margin: 0 auto; padding: 14px; }
      .status { border: 1px solid var(--line); background: var(--panel); padding: 10px; margin-bottom: 12px; min-height: 42px; color: var(--muted); }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .card { border: 1px solid var(--line); background: var(--panel); padding: 12px; }
      .card h2 { margin: 0 0 10px; font-size: 15px; }
      .drop-zone {
        border: 1px dashed #7a7a7a;
        min-height: 120px;
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--muted);
        margin-bottom: 8px;
        padding: 8px;
      }
      .drop-zone.drag { border-color: #fff; color: #fff; }
      input, select, textarea, button {
        width: 100%;
        margin-bottom: 8px;
        border: 1px solid var(--line);
        background: #000;
        color: var(--text);
        padding: 8px;
        font: inherit;
      }
      button { cursor: pointer; }
      .file-list { border: 1px solid var(--line); max-height: 540px; overflow: auto; }
      .file-row {
        border-bottom: 1px solid var(--line);
        padding: 10px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }
      .file-row:last-child { border-bottom: 0; }
      .file-row.active-main { outline: 1px solid #267dff; background: #07111f; }
      .file-row.active-kias { outline: 1px solid #8f4dff; background: #130a1f; }
      .file-row.active-main.active-kias { outline: 1px solid #00d9ff; background: #051b20; }
      .meta { color: var(--muted); font-size: 12px; }
      .actions { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
      .actions button { width: auto; margin: 0; }
      .tag { font-size: 11px; border: 1px solid var(--line); padding: 2px 6px; }
      .tag.main { border-color: #267dff; color: #8db7ff; }
      .tag.kias { border-color: #8f4dff; color: #c6a8ff; }
      iframe { width: 100%; min-height: 300px; border: 1px solid var(--line); background: #fff; }
      textarea { min-height: 220px; }
      .two-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>K.I.A.S // ADMIN</h1>
      <div id="status" class="status">System ready.</div>

      <div class="grid">
        <section class="card">
          <h2>Upload</h2>
          <div id="dropZone" class="drop-zone">DROP FILES HERE</div>
          <input id="fileInput" type="file" multiple />
          <button id="uploadBtn">UPLOAD</button>
          <input id="searchInput" type="search" placeholder="Search files" />
          <div id="registryCount" class="meta">0 files</div>
          <div id="registryList" class="file-list"></div>
        </section>

        <section class="card">
          <h2>Preview + Editor</h2>
          <div class="meta">Selected file: <span id="selectedFile">None</span></div>
          <iframe id="preview"></iframe>
          <textarea id="editor" spellcheck="false" placeholder="Select an HTML/text file to edit"></textarea>
          <div class="two-buttons">
            <button id="saveBtn">SAVE CHANGES</button>
            <button id="refreshBtn">REFRESH</button>
          </div>
          <div class="meta" id="activeTargets">ACTIVE MAIN: none | ACTIVE KIAS: none</div>
        </section>
      </div>
    </div>

    <script>
      const state = {
        files: [],
        selectedUploadFiles: [],
        selectedFile: null,
        config: { main: "index.html", kias: "kias.html" }
      };

      const statusEl = document.getElementById("status");
      const registryList = document.getElementById("registryList");
      const registryCount = document.getElementById("registryCount");
      const fileInput = document.getElementById("fileInput");
      const dropZone = document.getElementById("dropZone");
      const searchInput = document.getElementById("searchInput");
      const preview = document.getElementById("preview");
      const editor = document.getElementById("editor");
      const selectedFileEl = document.getElementById("selectedFile");
      const activeTargetsEl = document.getElementById("activeTargets");

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? "var(--bad)" : "var(--ok)";
      }

      async function api(url, options = {}) {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...options
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || `Request failed: ${response.status}`);
        return data;
      }

      function formatSize(size) {
        if (!size) return "0 B";
        const units = ["B", "KB", "MB", "GB"];
        const i = Math.min(Math.floor(Math.log(size) / Math.log(1024)), units.length - 1);
        return `${(size / (1024 ** i)).toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
      }

      function filteredFiles() {
        const q = searchInput.value.trim().toLowerCase();
        return state.files.filter((f) => !q || f.name.toLowerCase().includes(q));
      }

      function renderRegistry() {
        const files = filteredFiles();
        registryCount.textContent = `${files.length} / ${state.files.length} files`;

        registryList.innerHTML = files.map((file) => {
          const isMain = file.name === state.config.main;
          const isKias = file.name === state.config.kias;
          const rowClasses = ["file-row", isMain ? "active-main" : "", isKias ? "active-kias" : ""].join(" ").trim();

          const tags = [
            isMain ? '<span class="tag main">ACTIVE MAIN</span>' : "",
            isKias ? '<span class="tag kias">ACTIVE KIAS</span>' : ""
          ].join(" ");

          const htmlActions = file.type === "html"
            ? `
              <button onclick="setTarget('main', '${encodeURIComponent(file.name)}')">SET AS MAIN</button>
              <button onclick="setTarget('kias', '${encodeURIComponent(file.name)}')">SET AS KIAS</button>
            `
            : "";

          return `
            <div class="${rowClasses}">
              <div>
                <strong>${file.name}</strong> ${tags}
                <div class="meta">type: ${file.type} | size: ${formatSize(file.size)} | uploaded: ${new Date(file.uploadedAt).toLocaleString()}</div>
              </div>
              <div class="actions">
                <button onclick="openFile('${encodeURIComponent(file.name)}')">OPEN</button>
                ${htmlActions}
                <button onclick="removeFile('${encodeURIComponent(file.name)}')">DELETE</button>
              </div>
            </div>
          `;
        }).join("") || '<div class="file-row"><div>No files in registry.</div></div>';

        activeTargetsEl.textContent = `ACTIVE MAIN: ${state.config.main || "none"} | ACTIVE KIAS: ${state.config.kias || "none"}`;
      }

      async function refreshAll() {
        const [filesData, configData] = await Promise.all([api("/files"), api("/config")]);
        state.files = filesData.files || [];
        state.config = configData;
        renderRegistry();
      }

      async function filesToPayload(files) {
        return Promise.all(files.map((file) => new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const result = String(reader.result);
            resolve({
              name: file.name,
              mime: file.type || "application/octet-stream",
              content: result.split(",")[1] || ""
            });
          };
          reader.onerror = () => reject(new Error(`Failed reading ${file.name}`));
          reader.readAsDataURL(file);
        })));
      }

      async function uploadSelectedFiles() {
        if (!state.selectedUploadFiles.length) {
          setStatus("No files selected.", true);
          return;
        }
        try {
          const payload = await filesToPayload(state.selectedUploadFiles);
          const result = await api("/upload", { method: "POST", body: JSON.stringify({ files: payload }) });
          state.selectedUploadFiles = [];
          fileInput.value = "";
          await refreshAll();
          setStatus(`Upload successful: ${result.files.length} file(s).`);
        } catch (err) {
          setStatus(`Upload failed: ${err.message}`, true);
        }
      }

      window.openFile = async function openFile(encodedName) {
        const name = decodeURIComponent(encodedName);
        try {
          const data = await api(`/file/${encodeURIComponent(name)}`);
          state.selectedFile = data.file;
          selectedFileEl.textContent = data.file.name;

          if (data.file.type === "html") {
            preview.srcdoc = data.content || "";
          } else {
            preview.srcdoc = `<pre>Preview only supports HTML in iframe.\nType: ${data.file.type}</pre>`;
          }

          if (data.encoding === "utf8") {
            editor.value = data.content || "";
            editor.disabled = false;
          } else {
            editor.value = "";
            editor.disabled = true;
          }

          setStatus(`Loaded file: ${name}`);
        } catch (err) {
          setStatus(`Open failed: ${err.message}`, true);
        }
      };

      window.removeFile = async function removeFile(encodedName) {
        const name = decodeURIComponent(encodedName);
        if (!confirm(`Delete ${name}?`)) return;

        try {
          await api(`/file/${encodeURIComponent(name)}`, { method: "DELETE" });
          if (state.selectedFile?.name === name) {
            state.selectedFile = null;
            selectedFileEl.textContent = "None";
            preview.srcdoc = "";
            editor.value = "";
          }
          await refreshAll();
          setStatus(`Deleted: ${name}`);
        } catch (err) {
          setStatus(`Delete failed: ${err.message}`, true);
        }
      };

      window.setTarget = async function setTarget(type, encodedName) {
        const file = decodeURIComponent(encodedName);
        try {
          await api("/set-target", {
            method: "POST",
            body: JSON.stringify({ type, file })
          });
          await refreshAll();
          setStatus(`Updated ${type.toUpperCase()} target: ${file}`);
        } catch (err) {
          setStatus(`Set target failed: ${err.message}`, true);
        }
      };

      async function saveSelectedFile() {
        if (!state.selectedFile) {
          setStatus("No file selected.", true);
          return;
        }
        if (editor.disabled) {
          setStatus("Binary file cannot be edited.", true);
          return;
        }

        try {
          await api(`/file/${encodeURIComponent(state.selectedFile.name)}`, {
            method: "POST",
            body: JSON.stringify({ content: editor.value, encoding: "utf8" })
          });

          if (state.selectedFile.type === "html") {
            preview.srcdoc = editor.value;
          }

          await refreshAll();
          setStatus(`Saved: ${state.selectedFile.name}`);
        } catch (err) {
          setStatus(`Save failed: ${err.message}`, true);
        }
      }

      document.getElementById("uploadBtn").addEventListener("click", uploadSelectedFiles);
      document.getElementById("saveBtn").addEventListener("click", saveSelectedFile);
      document.getElementById("refreshBtn").addEventListener("click", async () => {
        try {
          await refreshAll();
          setStatus("Refreshed.");
        } catch (err) {
          setStatus(`Refresh failed: ${err.message}`, true);
        }
      });
      searchInput.addEventListener("input", renderRegistry);

      fileInput.addEventListener("change", (e) => {
        state.selectedUploadFiles = Array.from(e.target.files || []);
        setStatus(`${state.selectedUploadFiles.length} file(s) selected.`);
      });

      ["dragenter", "dragover"].forEach((eventName) => {
        dropZone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropZone.classList.add("drag");
        });
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropZone.classList.remove("drag");
        });
      });

      dropZone.addEventListener("drop", (event) => {
        state.selectedUploadFiles = Array.from(event.dataTransfer.files || []);
        setStatus(`${state.selectedUploadFiles.length} file(s) dropped.`);
      });

      (async function init() {
        try {
          await refreshAll();
          setStatus("Admin panel ready.");
        } catch (err) {
          setStatus(`Initialization failed: ${err.message}`, true);
        }
      })();
    </script>
  </body>
</html>
