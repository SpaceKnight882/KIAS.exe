<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="kias-panel-password" content="<KIAS.exe>">
<meta name="kias-panel-label" content="KIAS Archive Node">
<title>KREED INDUSTRIES // K.I.A.S NODE</title>

<style>
body { margin: 0; background: #000; color: #e6e6e6; font-family: monospace; }
body::after { content:""; position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; background: repeating-linear-gradient(0deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 1px, transparent 1px, transparent 3px); }
header { padding: 12px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
.title { font-size: 12px; letter-spacing: 2px; }
.status { font-size: 10px; color: #777; }
.layout { display: grid; grid-template-columns: 220px 1fr 300px; height: calc(100vh - 40px); }
.sidebar { border-right: 1px solid #111; padding: 15px; overflow-y: auto; }
.nav { font-size: 11px; padding: 6px 0; color: #888; cursor: pointer; }
.nav:hover, .nav.active { color: #fff; }
.main { padding: 15px; overflow-y: auto; }
.section-title { font-size: 11px; border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 10px; }
.file { padding: 8px; border-bottom: 1px solid #111; font-size: 11px; cursor: pointer; }
.file:hover { background: #050505; }
.sidepanel { border-left: 1px solid #111; padding: 15px; font-size: 10px; color: #777; overflow-y: auto; }
.log { margin-bottom: 6px; }
.tag { display: inline-block; border: 1px solid #444; padding: 2px 4px; margin-right: 5px; font-size: 9px; }
.viewer { margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; font-size: 11px; }
.blink::after { content: "_"; animation: blink 1s infinite; }
.asset-preview { margin-top: 6px; border: 1px solid #1f1f1f; padding: 8px; background: #090909; }
.asset-preview img, .asset-preview video, .asset-preview audio { width: 100%; max-height: 240px; object-fit: cover; }
.asset-preview pre { white-space: pre-wrap; max-height: 240px; overflow: auto; margin: 0; color: #d0d0d0; }
.meta { color: #989898; font-size: 10px; }
.security-panel { margin: 10px 0 14px; border: 1px solid #222; padding: 8px; background: #050505; }
.security-panel div { margin-bottom: 4px; }
@keyframes blink { 50% { opacity: 0; } }
</style>
<script src="panel-auth.js"></script>
</head>

<body>
<header>
<div class="title">KREED INDUSTRIES // K.I.A.S ARCHIVE NODE</div>
<div class="status blink">USER SESSION: &lt;KIAS.exe&gt; // STATUS: ACTIVE</div>
</header>

<div class="layout">
<div class="sidebar" id="sidebar"></div>
<div class="main" id="main"><div class="section-title">SYSTEM INITIALIZED</div><div class="file">SELECT A CATEGORY</div></div>
<div class="sidepanel" id="sidepanel">
  <div>K.I.A.S SYSTEM LOG</div>
  <div class="security-panel">
    <div>[ACCESS CONTROL]</div>
    <div>ROUTES LOCKED: /kias, /admin</div>
    <div>AUTH: BASIC PASSWORD CHALLENGE</div>
  </div>
  <div id="logs"></div>
</div>
</div>

<script>
const storageKey = "kiasContentAssets";
const sectionLabels = {
  company: "Main Company Info",
  lab: "Lab Reports",
  testing: "Currently Testing",
  containment: "In Containment",
  watchlist: "Watchlist",
  journal: "Research Journal",
  newkias: "New KIAS Section"
};

const defaultData = {
  company: ["Corporate Structure File", "Executive Records", "Internal Policies"],
  lab: ["Experiment 01", "Crystal Study A", "Subject Report 12"],
  testing: ["Subject A (Active)", "Subject B (Unstable)"],
  containment: ["Entity 03 (Sealed)", "Specimen 09"],
  watchlist: ["Unknown Subject", "External Observer"],
  journal: ["Entry 001", "Entry 002", "Entry 003"],
  newkias: []
};

const sidebar = document.getElementById("sidebar");
const main = document.getElementById("main");
const logs = document.getElementById("logs");
let activeSection = "company";
let activeRecord = null;
const escapeHtml = (value = "") =>
  String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
const decodeDataUrlText = (dataUrl = "") => {
  try {
    const encoded = (dataUrl.split(",")[1] || "");
    const binary = atob(encoded);
    const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
    return new TextDecoder().decode(bytes);
  } catch {
    return "[UNREADABLE CONTENT]";
  }
};

const getAssets = () => {
  try { return JSON.parse(localStorage.getItem(storageKey) || "[]"); }
  catch { return []; }
};

function renderSidebar() {
  sidebar.innerHTML = "";
  Object.entries(sectionLabels).forEach(([key, label]) => {
    const div = document.createElement("div");
    div.className = `nav${activeSection === key ? " active" : ""}`;
    div.textContent = label.toUpperCase();
    div.onclick = () => load(key);
    sidebar.appendChild(div);
  });

  const admin = document.createElement("div");
  admin.className = "nav";
  admin.textContent = "OPEN ADMIN PANEL";
  admin.onclick = () => window.location.href = "admin";
  sidebar.appendChild(admin);

  const backend = document.createElement("div");
  backend.className = "nav";
  backend.textContent = "OPEN BACKEND SECTION";
  backend.onclick = () => window.location.href = "kias.exe";
  sidebar.appendChild(backend);

  const back = document.createElement("div");
  back.className = "nav";
  back.textContent = "RETURN TO MAIN SITE";
  back.onclick = () => window.location.href = "/";
  sidebar.appendChild(back);
}

function renderPreview(asset) {
  if (asset.type.startsWith("image/")) return `<img src="${asset.dataUrl}" alt="${escapeHtml(asset.name)}">`;
  if (asset.type.startsWith("audio/")) return `<audio controls src="${asset.dataUrl}"></audio>`;
  if (asset.type.startsWith("video/")) return `<video controls src="${asset.dataUrl}"></video>`;
  if (asset.type.startsWith("text/") || /json|xml|javascript/.test(asset.type)) {
    const raw = decodeDataUrlText(asset.dataUrl).slice(0, 2400);
    return `<pre>${escapeHtml(raw)}</pre>`;
  }
  return `<div class="tag">${escapeHtml(asset.type || "FILE")}</div>`;
}

function load(type) {
  activeSection = type;
  activeRecord = null;
  renderSidebar();
  main.innerHTML = `<div class="section-title">${sectionLabels[type].toUpperCase()}</div>`;

  defaultData[type].forEach(item => {
    const div = document.createElement("div");
    div.className = "file";
    div.innerHTML = `${escapeHtml(item)}<div><span class="tag">CLASSIFIED</span><span class="tag">1980</span></div>`;
    div.onclick = () => openFile({ name: item, description: "Legacy archive record.", essentials: "classified" });
    main.appendChild(div);
  });

  const uploaded = getAssets().filter(a => a.targetPage === "kias" && a.targetSection === type);
  uploaded.forEach(asset => {
    const div = document.createElement("div");
    div.className = "file";
    div.innerHTML = `<strong>${escapeHtml(asset.title || asset.name)}</strong><div class="meta">${new Date(asset.uploadedAt).toLocaleString()} • ${(asset.size/1024).toFixed(1)} KB</div><div>${escapeHtml((asset.description || "No description").slice(0, 120))}</div>`;
    div.onclick = () => openFile(asset);
    main.appendChild(div);
  });

}

function openFile(record) {
  activeRecord = record;
  const existingViewer = main.querySelector(".viewer");
  if (existingViewer) existingViewer.remove();
  main.innerHTML += `<div class="viewer"><div>[FILE OPENED]</div><div>NAME: ${escapeHtml(record.title || record.name)}</div><div>STATUS: ARCHIVED</div><div>ACCESS LEVEL: KIAS NODE</div><br><div>DESCRIPTION: ${escapeHtml(record.description || "N/A")}</div><div>ESSENTIALS: ${escapeHtml(record.essentials || "N/A")}</div><div class="asset-preview">${record.dataUrl ? renderPreview(record) : "<div>CONTENT: [DATA NOT FOUND]</div>"}</div></div>`;
}

function addLog() {
  const messages = ["Data integrity check running...", "New archive node connected.", "Memory inconsistency detected.", "Node access logged.", "Subject data mismatch."];
  const div = document.createElement("div");
  div.className = "log";
  div.textContent = "> " + messages[Math.floor(Math.random() * messages.length)];
  logs.prepend(div);
}

setInterval(addLog, 3000);
window.addEventListener("storage", () => load(activeSection));
renderSidebar();
load("company");
</script>
</body>
</html>
