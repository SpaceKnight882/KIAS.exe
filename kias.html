<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KIAS Secure Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell kias-shell">
      <main class="kias-main">
        <h1>Welcome to the KIAS Secure Portal</h1>
        <p class="lead">Authorized access confirmed.</p>

        <section class="kias-info" aria-live="polite">
          <h2>Published Information</h2>
          <p id="published-info">No information has been published yet.</p>
        </section>

        <div class="kias-actions">
          <a class="btn btn-outline" href="index.html">Return to Main Site</a>
          <button id="compliance-admin-btn" class="btn btn-outline" type="button">
            Compliance
          </button>
        </div>

        <section id="compliance-login" class="access-card" hidden>
          <h2>Compliance Admin Access</h2>
          <label for="admin-password-input">Admin password</label>
          <input
            id="admin-password-input"
            class="access-input"
            type="password"
            placeholder="Enter admin password"
            autocomplete="off"
          />
          <div class="access-actions">
            <button id="admin-submit-btn" class="btn btn-outline" type="button">Open Admin Panel</button>
          </div>
          <p id="admin-status" class="access-status" aria-live="polite"></p>
        </section>
      </main>
    </div>

    <script>
      const publishedInfo = document.getElementById("published-info");
      const complianceButton = document.getElementById("compliance-admin-btn");
      const complianceLogin = document.getElementById("compliance-login");
      const adminPasswordInput = document.getElementById("admin-password-input");
      const adminSubmitButton = document.getElementById("admin-submit-btn");
      const adminStatus = document.getElementById("admin-status");

      const loadPublishedInfo = () => {
        const savedInfo = window.localStorage.getItem("kiasPublishedInfo");
        publishedInfo.textContent =
          savedInfo && savedInfo.trim().length > 0
            ? savedInfo
            : "No information has been published yet.";
      };

      complianceButton.addEventListener("click", () => {
        complianceLogin.hidden = false;
        adminStatus.textContent = "";
        adminPasswordInput.focus();
      });

      adminSubmitButton.addEventListener("click", () => {
        if (adminPasswordInput.value === "owner-ecm") {
          window.location.href = "admin.html";
          return;
        }

        adminStatus.textContent = "Access denied. Invalid password.";
      });

      adminPasswordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          adminSubmitButton.click();
        }
      });

      window.addEventListener("storage", loadPublishedInfo);
      loadPublishedInfo();
    </script>
  </body>
</html>
