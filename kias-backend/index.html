<!DOCTYPE html>
<html>
<head>
<title>KIAS.exe</title>
<style>
body {
    background: black;
    color: white;
    font-family: monospace;
    padding: 20px;
}
#chatbox {
    width: 100%;
    height: 300px;
    border: 1px solid white;
    overflow-y: auto;
    padding: 10px;
    margin-bottom: 10px;
}
input {
    width: 80%;
    padding: 10px;
    background: black;
    color: white;
    border: 1px solid white;
}
button {
    padding: 10px;
    background: white;
    color: black;
    border: none;
}
.system { color: #9ca3af; }
.error { color: #f87171; }
</style>
</head>

<body>

<h2>K.I.A.S // EXECUTION INTERFACE</h2>

<div id="chatbox"></div>

<input id="input" placeholder="enter message..." />
<button onclick="send()">EXECUTE</button>

<script>
const SERVER = "https://kias-exe.onrender.com";

async function send() {
    const input = document.getElementById("input");
    const chatbox = document.getElementById("chatbox");

    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    chatbox.innerHTML += "<div>> " + message + "</div>";
    chatbox.innerHTML += "<div class='system'>KIAS: [PROCESSING]</div>";
    chatbox.scrollTop = chatbox.scrollHeight;

    try {
        const user = "anonymous";
        const text = message;

        const res = await fetch(SERVER + "/ai", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                user,
                message: text
            })
        });

        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        const reply = data.reply;

        chatbox.innerHTML += "<div>KIAS: " + reply + "</div>";
    } catch (err) {
        console.error(err);
        chatbox.innerHTML += "<div class='error'>KIAS: [KIAS OFFLINE]</div>";
    }

    chatbox.scrollTop = chatbox.scrollHeight;
}

document.getElementById("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
